<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .swiper-wrap {
        width: 500px;
        height: max-content;
        position: relative;
        margin: auto;
      }
      .swiper {
        width: 500px;
        height: 500px;
        position: relative;
        margin: auto;
        overflow: hidden;
      }
      .swiper-content {
        width: max-content;
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        list-style: none;
        transition: 1s;
      }
      .swiper-item {
        width: 500px;
        height: 100%;
        border: 1px solid;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }
      .prev,
      .next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1;
        cursor: pointer;
      }
      .prev {
        left: 5px;
      }
      .next {
        right: 5px;
      }
      .swiper-content:first-child {
        left: -500px;
      }
    </style>
  </head>
  <body>
    <div class="swiper-wrap">
      <div class="swiper">
        <ul class="swiper-content">
          <li class="swiper-item">5</li>
          <li class="swiper-item">1</li>
          <li class="swiper-item">2</li>
          <li class="swiper-item">3</li>
          <li class="swiper-item">4</li>
          <li class="swiper-item">5</li>
          <li class="swiper-item">1</li>
        </ul>
      </div>
      <span class="prev">이전</span>
      <span class="next">다음</span>
    </div>
  </body>
  <script src="./swiper.js"></script>
</html>
