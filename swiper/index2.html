<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <ul class="list"></ul>
    </div>
  </body>
  <script>
    let list = [
      { id: 1, content: "list01", name: "oh" },
      { id: 2, content: "list02", name: "oh" },
      { id: 3, content: "list03", name: "oh" },
      { id: 4, content: "list04", name: "oh" },
      { id: 5, content: "list05", name: "oh" },
    ];
    list.forEach(function (i) {
      let _li = document.createElement("li");
      let _span = document.createElement("span");
      let _span2 = document.createElement("span");
      let _span3 = document.createElement("span");
      // 배열의 순서대로 객체를 구조분해 할당
      let { id, content, name } = i;
      _span.innerHTML = "번호 : " + id;
      _span2.innerHTML = "내용 : " + content;
      _span3.innerHTML = "작성자 : " + name;
      _li.append(_span, _span2, _span3);
      document.querySelector(".list").append(_li);
    });
  </script>
</html>
