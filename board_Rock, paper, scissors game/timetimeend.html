<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    // 테스트 코드 작성
    // time() : 코드의 실행시간 확인
    console.time();

    let num = 0;
    for (let i = 0; i < 100; i++) {
      num += i;
    }
    console.log(num);

    // timeEnd() : 코드 실행시간 측정 종료
    console.timeEnd();
  </script>
</html>
