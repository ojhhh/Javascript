<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가위바위보</title>
    <link rel="stylesheet" href="./rsp.css" />
  </head>
  <body>
    <div class="cntbox">
      <div class="level">
        <span>난이도 선택</span>
        <span class="level1" onclick="level1()">쉬움</span>
        <span class="level2" onclick="level2()">어려움</span>
        <span class="level3" onclick="level3()">매우어려움</span>
      </div>
      <div class="moneybox">
        <div class="pmoney">
          <h2>플레이어 소지금</h2>
          <span>0</span>
        </div>
        <div class="cmoney">
          <h2>컴퓨터 소지금</h2>
          <span>50000</span>
        </div>
      </div>
    </div>

    <div class="a">
      <div class="wrap">
        <div>
          <h1>가위바위보</h1>
        </div>
        <div class="game-wrap">
          <div class="player-select"></div>
          <div class="com-select"></div>
        </div>

        <h1 class="result">결과</h1>
        <p class="subResult">내용</p>

        <div class="btnbox">
          <button class="player-btn">가위</button>
          <button class="player-btn">바위</button>
          <button class="player-btn">보</button>
        </div>
      </div>
    </div>

    <div class="wrap2 cover">
      <div>
        <h1>묵찌빠</h1>
      </div>
      <div class="mjb-wrap">
        <div class="player-pick"></div>
        <div class="com-pick"></div>
      </div>

      <h1 class="mjbresult">결과</h1>
      <p class="mjbsubResult">내용</p>

      <div class="btnbox">
        <button class="mjb-btn">묵</button>
        <button class="mjb-btn">찌</button>
        <button class="mjb-btn">빠</button>
      </div>
    </div>
  </body>
  <script src="./rsp.js"></script>
</html>
